<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahayak AI - Welcome</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #f97316; /* Orange gradient base */
            --primary-hover: #ea580c;
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s infinite ease-in-out alternate;
        }
        .orb-1 {
            width: 300px;
            height: 300px;
            background: rgba(249, 115, 22, 0.15);
            top: 20%;
            left: 20%;
        }
        .orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(56, 189, 248, 0.1);
            bottom: 10%;
            right: 15%;
            animation-delay: -5s;
        }
        .orb-3 {
            width: 250px;
            height: 250px;
            background: rgba(168, 85, 247, 0.15);
            top: 40%;
            right: 35%;
            animation-delay: -2s;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 50px); }
        }

        /* Navbar Customization */
        .navbar {
            background: rgba(15, 23, 42, 0.5) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--card-border) !important;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(to right, #f8fafc, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-link {
            color: var(--text-muted) !important;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .nav-link:hover {
            color: var(--text-main) !important;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Header Area */
        .page-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.2), rgba(249, 115, 22, 0.05));
            border-radius: 16px;
            border: 1px solid rgba(249, 115, 22, 0.2);
            margin-bottom: 1rem;
            box-shadow: 0 8px 32px rgba(249, 115, 22, 0.15);
        }
        .logo-container svg {
            width: 32px;
            height: 32px;
            color: var(--primary);
        }
        .page-header h1 {
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .page-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Toggle Switch */
        .toggle-wrapper {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50px;
            padding: 0.25rem;
            display: inline-flex;
            margin-bottom: 2rem;
            border: 1px solid var(--card-border);
            position: relative;
        }
        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.75rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }
        .toggle-btn.active {
            color: #fff;
        }
        .toggle-slider {
            position: absolute;
            top: 0.25rem;
            left: 0.25rem;
            bottom: 0.25rem;
            width: calc(50% - 0.25rem);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Auth Card */
        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        /* Dynamic Form Elements */
        .form-control {
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(249, 115, 22, 0.5);
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1);
            color: var(--text-main);
        }
        .form-control::placeholder {
            color: var(--text-muted);
        }
        .form-label {
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            margin-left: 0.25rem;
        }
        
        .input-group-field {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        /* Smooth Toggle Animation for Fields */
        .form-group-dynamic {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.4s ease, margin 0.4s ease;
            margin-bottom: 0;
        }
        .form-group-dynamic.show {
            max-height: 120px;
            opacity: 1;
            margin-bottom: 1.5rem;
            overflow: visible;
        }

        /* Buttons */
        .btn-auth {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-weight: 600;
            font-size: 1.05rem;
            width: 100%;
            margin-top: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.4);
        }
        .btn-auth:active {
            transform: translateY(0);
        }
        .btn-auth:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Button Toggle Animation */
        .btn-container {
            position: relative;
            height: 52px; /* Fixed height for absolute positioned buttons */
            margin-top: 1rem;
        }
        .btn-auth-action {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-auth-action.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* Error Messages Inline */
        .inline-error {
            color: #ef4444; /* red-500 */
            font-size: 0.85rem;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
            min-height: 20px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .inline-error.show {
            opacity: 1;
        }

        /* Footer Text */
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
            cursor: pointer;
        }
        .auth-footer a:hover {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- Background Orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary">
  <div class="container">
    <a class="navbar-brand" href="{% url 'home' %}">Sahayak AI</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
      </ul>
    </div>
  </div>
</nav>

<div class="main-content">
    
    <!-- Header with Logo -->
    <div class="page-header">
        <div class="logo-container">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
        </div>
        <h1>Sahayak AI</h1>
        <p id="pageSubtitle">Hello, Again! We are happy to have you back.</p>
    </div>

    <!-- Toggle Switch -->
    <div class="toggle-wrapper">
        <div class="toggle-slider" id="toggleSlider"></div>
        <button class="toggle-btn active" id="toggleLoginBtn" onclick="setMode('login')">Login</button>
        <button class="toggle-btn" id="toggleSignupBtn" onclick="setMode('signup')">Sign Up</button>
    </div>

    <div class="container d-flex justify-content-center">
        <div class="auth-card">
            
            <form id="authForm" novalidate>
                <!-- Dynamic Name Field (Hidden on Login) -->
                <div class="form-group-dynamic" id="nameGroup">
                    <div class="input-group-field">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" placeholder="John Doe">
                    </div>
                </div>

                <div class="input-group-field">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required autofocus>
                </div>

                <div class="input-group-field" style="margin-bottom: 0.5rem;">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                </div>
                
                <!-- Inline Error Container -->
                <div class="inline-error" id="authError"></div>

                <!-- Buttons Container -->
                <div class="btn-container">
                    <button type="submit" class="btn-auth btn-auth-action show" id="loginBtn">Log In</button>
                    <button type="button" class="btn-auth btn-auth-action" id="signupBtn">Sign Up</button>
                </div>
            </form>
            
            <div class="auth-footer" id="authFooter">
                Don't have an account? <a onclick="setMode('signup')">Sign up</a>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- UI Logic -->
<script>
    function setMode(mode) {
        const toggleSlider = document.getElementById('toggleSlider');
        const toggleLoginBtn = document.getElementById('toggleLoginBtn');
        const toggleSignupBtn = document.getElementById('toggleSignupBtn');
        
        const nameGroup = document.getElementById('nameGroup');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        
        const pageSubtitle = document.getElementById('pageSubtitle');
        const authFooter = document.getElementById('authFooter');
        
        const emailInput = document.getElementById('email');
        const nameInput = document.getElementById('name');
        const authError = document.getElementById('authError');
        
        // Clear errors
        if (authError) {
            authError.classList.remove('show');
            authError.textContent = '';
        }

        if (mode === 'signup') {
            toggleSlider.style.transform = 'translateX(100%)';
            toggleLoginBtn.classList.remove('active');
            toggleSignupBtn.classList.add('active');
            
            nameGroup.classList.add('show');
            loginBtn.classList.remove('show');
            signupBtn.classList.add('show');
            
            pageSubtitle.textContent = 'Sign Up, Now! We are happy to have you with us.';
            authFooter.innerHTML = 'Already have an account? <a onclick="setMode(\'login\')">Log in</a>';
            
            // Autofocus
            setTimeout(() => nameInput.focus(), 400);
            
        } else {
            toggleSlider.style.transform = 'translateX(0)';
            toggleSignupBtn.classList.remove('active');
            toggleLoginBtn.classList.add('active');
            
            nameGroup.classList.remove('show');
            signupBtn.classList.remove('show');
            loginBtn.classList.add('show');
            
            pageSubtitle.textContent = 'Hello, Again! We are happy to have you back.';
            authFooter.innerHTML = 'Don\'t have an account? <a onclick="setMode(\'signup\')">Sign up</a>';
            
            // Autofocus
            setTimeout(() => emailInput.focus(), 400);
        }
    }
</script>

<!-- Firebase and App Logic -->
{% load static %}
<script type="module" src="{% static 'firebase.js' %}"></script>
<script type="module" src="{% static 'app.js' %}"></script>

</body>
</html>
